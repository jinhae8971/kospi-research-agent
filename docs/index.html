<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KOSPI Research Agent</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<header class="hero">
  <h1>📈 KOSPI Research Agent</h1>
  <p class="tagline" id="hero-tagline">Loading latest narrative…</p>
</header>

<main>
  <section class="card" id="narrative-card" hidden>
    <h2>📊 오늘의 내러티브</h2>
    <p id="narrative-text"></p>
    <div class="sector-row">
      <div>🔥 <strong>Hot:</strong> <span id="hot-sectors"></span></div>
      <div>❄️ <strong>Cooling:</strong> <span id="cooling-sectors"></span></div>
    </div>
    <p class="insight" id="insight-text"></p>
  </section>

  <section class="card" id="top5-card" hidden>
    <h2>🏆 2거래일 상승률 Top 5</h2>
    <div id="top5-grid" class="grid"></div>
  </section>

  <section class="card">
    <h2>📚 과거 보고서</h2>
    <ul id="history-list" class="history"></ul>
  </section>
</main>

<footer>
  <p>Generated by kospi-research-agent · 매 거래일 07:00 KST 자동 실행</p>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
